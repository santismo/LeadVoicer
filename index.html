<style>
:root{--bg:#06070b;--panel:#10131c;--panel2:#171b27;--line:#2a3042;--muted:#858ca4;--text:#f4f6ff;--accent:#7c5cff;--accent2:#00e0a4;--danger:#ff3b5c;--chord:#ffcf5a}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;touch-action:none}
body{padding:env(safe-area-inset-top) 8px 0;display:flex;justify-content:center;overflow:hidden}
#app{width:min(100vw,500px);height:calc(var(--appH,100svh) - env(safe-area-inset-top) - 4px);max-height:calc(var(--appH,100svh) - env(safe-area-inset-top) - 4px);display:flex;flex-direction:column;gap:3px;overflow:hidden}
header{flex:0 0 auto;display:grid;grid-template-columns:58px 46px 1fr 34px 36px;gap:6px;align-items:center;padding-top:3px}
button,select{min-width:0;color:var(--text);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:3px 3px;font-size:9px;font-weight:800;min-height:24px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
button:active{transform:scale(.97)}button.active{border-color:var(--accent2);background:rgba(0,224,164,.13)}button.primary{border-color:var(--accent);background:rgba(124,92,255,.2)}
#recordBtn{background:rgba(255,59,92,.08);border-color:rgba(255,59,92,.35)}#recordBtn.active{background:rgba(255,59,92,.22);border-color:var(--danger);box-shadow:0 0 16px rgba(255,59,92,.25)}#loopBtn.active,#metroBtn.active{background:rgba(0,224,164,.18);border-color:var(--accent2);color:var(--accent2);box-shadow:0 0 12px rgba(0,224,164,.18)}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#65202b;margin-right:4px;vertical-align:-1px}#recordBtn.active .dot{background:var(--danger);box-shadow:0 0 10px var(--danger)}
.tempoBox{display:flex;align-items:center;gap:3px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px 5px;min-width:0}.tempoBox label{font-size:10px;color:var(--muted);font-weight:800}
input[type=number]{width:44px;background:#090b12;border:1px solid var(--line);border-radius:8px;color:var(--text);padding:5px;font-size:14px;text-align:center}input[type=range]{width:100%;min-width:300px}

.settingsWrap,.voicerWrap{position:relative}#settingsBtn,#voicerBtn{min-width:34px;padding:6px;font-size:17px;line-height:1}#settingsMenu{display:none;position:absolute;right:0;top:40px;width:180px;transform:none;padding:8px;gap:6px;grid-template-columns:1fr;background:rgba(16,19,28,.98);border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.45);z-index:40}#settingsMenu.open{display:grid}
#voicerBtn{height:34px;display:flex;align-items:center;justify-content:center;padding:0;border-color:rgba(255,207,90,.38);background:rgba(255,207,90,.09)}
#voicerBtn.active{border-color:var(--chord);background:rgba(255,207,90,.18);box-shadow:0 0 12px rgba(255,207,90,.16)}
.chordGlyph{position:relative;display:block;width:20px;height:18px}.chordGlyph i{position:absolute;width:7px;height:7px;border-radius:50%;background:var(--chord);box-shadow:0 0 8px rgba(255,207,90,.28)}.chordGlyph i:nth-child(1){left:1px;bottom:1px}.chordGlyph i:nth-child(2){left:7px;top:1px}.chordGlyph i:nth-child(3){right:1px;bottom:3px}

#voicerMenu.open{display:grid}.voicerTop{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.voicerTitle{font-size:12px;font-weight:900;color:var(--chord);letter-spacing:.02em}.voicerGrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}.voicerControl{display:grid;gap:3px;min-width:0;position:relative}.voicerControl label{font-size:9px;color:var(--muted);font-weight:900;display:flex;justify-content:space-between;gap:6px}.voicerControl select,.voicerControl input,.voicerChoiceBtn{width:100%;height:26px;font-size:10px;padding:3px 5px}.voicerControl input[type=range]{min-width:0;height:20px;padding:0}.valueReadout{color:var(--chord);font-variant-numeric:tabular-nums}.choiceMenu{display:none;position:absolute;left:0;right:0;top:44px;z-index:80;max-height:185px;overflow:auto;background:rgba(16,19,28,.99);border:1px solid var(--line);border-radius:10px;padding:6px;box-shadow:0 8px 20px rgba(0,0,0,.45)}.choiceMenu.open{display:grid;gap:4px}.choiceMenu label{display:flex;align-items:center;justify-content:flex-start;gap:6px;font-size:10px;color:var(--text);font-weight:800}.choiceMenu input{width:auto!important;height:auto!important}.voicerButtons{display:grid;grid-template-columns:1fr 1fr;gap:7px}.voicerReadout{font-size:10px;color:var(--muted);line-height:1.25;border:1px solid var(--line);border-radius:10px;padding:7px;background:rgba(0,0,0,.18)}.voicerLast{font-size:11px;color:var(--text);font-weight:900;margin-bottom:3px}.voicerHint{color:var(--muted)}.voicerWide{grid-column:1 / -1}
.timelineShell{position:relative;flex:1 1 0;min-height:0;background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden}
.timelineHeader{height:34px;padding:3px;display:grid;grid-template-columns:60px minmax(0,1fr) 46px 46px;align-items:center;gap:6px;padding:4px 6px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.025)}
.trackSelect,.soundSelect,.colorSelect{min-width:0;height:24px;padding:0 6px;border-radius:8px;font-size:11px}.miniBtn{min-height:24px;height:24px;padding:0 7px;border-radius:8px;font-size:10px}

.pianoKey{position:absolute;left:0;width:38px;border-right:1px solid var(--line);border-bottom:1px solid rgba(255,255,255,.045);font-size:7px;color:var(--muted);padding:1px 3px;z-index:5;background:rgba(6,7,11,.95)}.pianoKey.black{color:rgba(255,255,255,.38);background:rgba(0,0,0,.92)}.vZoomStrip{position:absolute;left:0;top:0;width:38px;bottom:0;z-index:40;pointer-events:auto;background:transparent;touch-action:none}.vZoomThumb{display:none}
.pianoRow{position:absolute;left:38px;right:0;border-bottom:1px solid rgba(255,255,255,.035)}.pianoRow.white{background:rgba(255,255,255,.075)}.pianoRow.black{background:rgba(255,255,255,.03)}
.gridLine{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.055);z-index:1}.gridLine.beat{background:rgba(255,255,255,.14)}.gridLine.bar{background:rgba(124,92,255,.38)}
.note{box-sizing:border-box;min-width:10px;position:absolute;height:10px;border-radius:4px;background:var(--noteColor);border:1px solid rgba(255,255,255,.32);box-shadow:0 2px 7px rgba(0,0,0,.35);z-index:4;touch-action:none}.note.selected{outline:2px solid white;filter:brightness(1.35)}
.chordRegion{position:absolute;top:18px!important;height:13px!important;border-radius:5px;background:rgba(255,207,90,.26);border:1px solid rgba(255,207,90,.72);color:var(--chord);font-size:8px;font-weight:900;padding:1px 3px;z-index:12;white-space:nowrap;overflow:hidden;text-overflow:clip;min-width:0}
#playhead{position:absolute;top:0;bottom:0;width:2px;background:#fff;box-shadow:0 0 10px rgba(255,255,255,.85);z-index:10;pointer-events:none}.loopRegion{position:absolute!important;top:0!important;height:13px!important;z-index:28!important;background:rgba(0,255,160,.38)!important;border:2px solid rgba(0,255,190,.95)!important;border-radius:5px!important;box-shadow:0 0 12px rgba(0,255,170,.45)!important;pointer-events:none}.selectBox{position:absolute;border:1px solid rgba(255,255,255,.9);background:rgba(124,92,255,.18);z-index:30;pointer-events:none;border-radius:4px}
.zoomControls{flex:0 0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:3px}.middleControls{flex:0 0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:3px}.statusRow{display:none;flex:0 0 auto}
.pill{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px 6px;color:var(--muted);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pill b{color:var(--text)}
.keyboardShell{flex:1 1 0;min-height:0;overflow:hidden;display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:5px}#app.hideFretboard .keyboardShell{display:none}#app.hideFretboard .timelineShell{flex:1 1 0;min-height:0}#app.hideFretboard{gap:3px}
.fretboardWrap{position:relative;flex:1 1 auto;min-height:0;overflow:hidden;border-radius:13px;border:1px solid var(--line);background:linear-gradient(90deg,rgba(255,255,255,.06) 0 1px,transparent 1px),linear-gradient(180deg,rgba(255,255,255,.045) 0 1px,transparent 1px),#0a0c13;touch-action:none;padding-bottom:12px}
#fretboard{height:calc(100% - 10px);display:grid;grid-template-rows:repeat(6,1fr);grid-template-columns:repeat(13,1fr);gap:3px;padding:5px}.fret{border:1px solid #2a3044;background:linear-gradient(180deg,#171b28,#0f121b);border-radius:8px;min-width:0;min-height:0;user-select:none}.fret.open{border-color:rgba(124,92,255,.35)}.fret:active,.fret.flash{background:rgba(0,224,164,.3);border-color:var(--accent2);box-shadow:inset 0 0 18px rgba(0,224,164,.12)}.fret.stepLit{background:var(--fretLitColor,rgba(255,255,255,.88));border-color:rgba(255,255,255,.95);box-shadow:0 0 14px var(--fretLitColor,rgba(255,255,255,.24))}
.fretMarkers{position:absolute;left:8px;right:8px;bottom:2px;height:8px;display:grid;grid-template-columns:repeat(13,1fr);gap:4px;pointer-events:none}.markerCell{display:flex;align-items:center;justify-content:center}.marker{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.48)}.fretChordLabel{position:absolute;left:10px;bottom:2px;z-index:7;color:var(--chord);font-size:8px;font-weight:700;opacity:.82;pointer-events:none;text-shadow:0 1px 4px #000;max-width:72px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.marker.double{width:14px;height:6px;background:radial-gradient(circle at 4px 50%,rgba(255,255,255,.55) 0 3px,transparent 3.5px),radial-gradient(circle at 12px 50%,rgba(255,255,255,.55) 0 3px,transparent 3.5px)}
.tsBtn{min-height:24px;height:24px;padding:0 5px;border-radius:8px;font-size:10px;color:var(--text)}
.popupMenu{display:none;position:absolute;left:12px;top:50px;z-index:60;background:rgba(16,19,28,.98);border:1px solid var(--line);border-radius:14px;padding:10px;box-shadow:0 12px 30px rgba(0,0,0,.45);gap:7px;grid-template-columns:1fr;color:var(--text);font-size:12px}
.popupMenu.open{display:grid}
.popupMenu input{width:70px;background:#090b12;border:1px solid var(--line);border-radius:8px;color:var(--text);padding:5px;text-align:center}
.popupMenu label{display:flex;align-items:center;justify-content:space-between;gap:8px;color:var(--muted)}
.barZoomHeader{cursor:ew-resize;position:absolute;left:38px;right:0;top:0;height:12px;z-index:18;background:color-mix(in srgb,var(--panel) 78%,transparent);border-bottom:1px solid var(--line);touch-action:none;overflow:hidden;pointer-events:auto}
.barZoomHeader .barNumber{top:0!important;font-size:8px!important}
.barNumber{position:absolute;top:0;font-size:8px;color:rgba(255,255,255,.72);z-index:2;pointer-events:none;transform:translateX(3px)}
#loopMenu{left:auto!important;right:8px!important;top:76px!important;transform:none!important;width:min(72vw,270px)!important}.trackMenu{left:6px!important;right:auto!important;top:68px!important;transform:none!important;width:min(96vw,410px)!important}.themeMenu{left:8px!important;right:auto!important;top:76px!important;transform:none!important;width:min(96vw,390px)!important}.volInput{width:34px!important;font-size:9px!important;padding:1px!important}.trackMixerRow{display:grid;grid-template-columns:70px 82px 34px 28px 28px;gap:4px;align-items:center;border:1px solid var(--line);border-radius:10px;padding:5px;background:rgba(0,0,0,.18)}.trackRowBtn{min-width:0!important;width:28px!important;height:26px!important;min-height:26px!important;padding:0!important;border-radius:7px!important;font-size:9px!important}.trackColorMenu{left:8px!important;right:auto!important;top:104px!important;transform:none!important;width:min(92vw,330px)!important}.trackFxMenu{left:8px!important;right:auto!important;top:112px!important;transform:none!important;width:min(96vw,410px)!important;max-height:78dvh;overflow:auto}.trackFxControl{display:grid!important;grid-template-columns:88px minmax(0,1fr) 42px!important;align-items:center!important;gap:7px!important}.trackFxControl input[type=range]{min-width:0!important;width:100%!important}.trackFxControl select{height:26px;font-size:10px}.trackFxControl span{text-align:right;color:var(--chord);font-size:10px;font-variant-numeric:tabular-nums}.bpmMenu{top:82px!important;left:50%!important;transform:translateX(-50%)!important;width:min(94vw,390px)!important}
.trackColorGrid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
.colorSwatchBtn{min-height:26px!important;height:26px!important;border-radius:7px!important;padding:0!important;border:2px solid rgba(255,255,255,.22)!important}
.colorSwatchBtn.selected{border-color:var(--text)!important;box-shadow:0 0 0 2px var(--accent)}
.themeSwatch{min-height:28px;border-radius:9px;border:1px solid var(--line);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.projectMenu{width:min(96vw,460px)!important;max-height:82dvh;overflow:auto}.projectMenu input{width:100%!important}.projectRow{display:grid;grid-template-columns:1fr auto auto auto;gap:5px;align-items:center;border:1px solid var(--line);border-radius:10px;padding:6px;background:rgba(0,0,0,.18)}
input,select,textarea{background:var(--panel2)!important;color:var(--text)!important;border-color:var(--line)!important}
input[type=number],input[type=text]{color:var(--text)!important;background:color-mix(in srgb,var(--panel2) 84%,var(--bg))!important}
input::placeholder{color:var(--muted)!important}
input[type=range]{accent-color:var(--accent);background:transparent!important}
button{background:var(--panel2);color:var(--text);border-color:var(--line)}
button.active,.primary{background:color-mix(in srgb,var(--accent) 35%,var(--panel2))!important;border-color:var(--accent)!important;color:var(--text)!important}
#timelineViewport,#timelineContent{background:color-mix(in srgb,var(--bg) 80%,var(--panel))!important}
.timelineShell,.keyboardShell,.tempoBox,.pill{background:var(--panel)!important;border-color:var(--line)!important}
.pianoKey{background:color-mix(in srgb,var(--panel2) 72%,var(--bg))!important;color:var(--muted)!important;border-color:var(--line)!important}
.pianoKey.black{background:color-mix(in srgb,#000 68%,var(--panel2))!important;color:color-mix(in srgb,var(--text) 45%,transparent)!important}
.gridLine{background:color-mix(in srgb,var(--line) 65%,transparent)!important}

.gridLine.bar{background:color-mix(in srgb,var(--accent) 45%,transparent)!important}
.barNumber{color:color-mix(in srgb,var(--text) 70%,transparent)!important}

.fretMarkers .marker,.marker{background:color-mix(in srgb,var(--muted) 70%,transparent)!important}
.popupMenu{background:color-mix(in srgb,var(--panel) 97%,var(--bg))!important;border-color:var(--line)!important;color:var(--text)!important}
.trackMixerRow input[type=range]{width:82px!important;min-width:82px!important;max-width:82px!important}.trackMixerRow,.projectRow{background:color-mix(in srgb,var(--panel2) 78%,transparent)!important;border-color:var(--line)!important}
.note{box-sizing:border-box;min-width:6px;box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--text) 15%,transparent)}

.pianoStripMask{position:absolute;left:0;top:0;bottom:0;width:38px;z-index:25;background:var(--panel);border-right:1px solid var(--line);pointer-events:none}
.pianoKey{z-index:31!important;pointer-events:none!important}

.trackMixerRow.activeTrack{background:color-mix(in srgb,var(--accent) 28%,var(--panel2))!important;border-color:var(--accent)!important;box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 45%,transparent) inset}
.trackMixerRow.activeTrack button{background:color-mix(in srgb,var(--accent) 22%,var(--panel2))!important}

<body>
<main id="app">
<header>
<button id="recordBtn"><span class="dot"></span>REC</button><button id="loopBtn">Loop</button>
<div class="tempoBox"><button id="tsBtn" class="tsBtn">4/4</button><button id="metroBtn" class="tsBtn">Met</button><label id="bpmLabel">BPM</label><input id="tempo" type="number" min="40" max="240" value="120"/><span id="subdivTop">1/16</span></div>
<div class="voicerWrap"><button id="voicerBtn" title="Voicizer"><span class="chordGlyph"><i></i><i></i><i></i></span></button><div id="voicerMenu">
  <div class="voicerTop"><div class="voicerTitle">Voicizer</div><button id="voicerEnableBtn">On</button></div>
  <div class="voicerGrid">
    <div class="voicerControl"><label>Key</label><button id="voicerKeyBtn" class="voicerChoiceBtn">C</button><div id="voicerKeyMenu" class="choiceMenu"></div></div>
    <div class="voicerControl"><label>Scale</label><button id="voicerScaleBtn" class="voicerChoiceBtn">Ionian</button><div id="voicerScaleMenu" class="choiceMenu"></div></div>
    <div class="voicerControl"><label for="voicerStyle">Voicing Style</label><select id="voicerStyle"></select></div>
    <div class="voicerControl"><label for="voicerRole">Input Role</label><select id="voicerRole"></select></div>
    <div class="voicerControl"><label for="voicerPlayability">Playability</label><select id="voicerPlayability"></select></div>
    <div class="voicerControl"><label for="voicerRakeMode">Rake</label><select id="voicerRakeMode"></select></div>
    <div class="voicerControl"><label for="voicerChordSize">Chord Size <span id="voicerChordSizeValue" class="valueReadout">4</span></label><input id="voicerChordSize" type="range" min="3" max="8" step="1"/></div>
    <div class="voicerControl"><label for="voicerRakeSpeed">Rake Speed <span id="voicerRakeSpeedValue" class="valueReadout">0</span></label><input id="voicerRakeSpeed" type="range" min="0" max="1" step=".01"/></div>
    <div class="voicerControl"><label for="voicerComplexity">Complexity <span id="voicerComplexityValue" class="valueReadout">45</span></label><input id="voicerComplexity" type="range" min="0" max="1" step=".01"/></div>
    <div class="voicerControl"><label for="voicerVoiceLeading">Voice Lead <span id="voicerVoiceLeadingValue" class="valueReadout">75</span></label><input id="voicerVoiceLeading" type="range" min="0" max="1" step=".01"/></div>
    <div class="voicerControl"><label for="voicerOutside">Outside <span id="voicerOutsideValue" class="valueReadout">10</span></label><input id="voicerOutside" type="range" min="0" max="1" step=".01"/></div>
    <div class="voicerControl"><label for="voicerVariation">Variation <span id="voicerVariationValue" class="valueReadout">35</span></label><input id="voicerVariation" type="range" min="0" max="1" step=".01"/></div>
    <div class="voicerControl"><label for="voicerRepeat">Repeat <span id="voicerRepeatValue" class="valueReadout">15</span></label><input id="voicerRepeat" type="range" min="0" max="1" step=".01"/></div>
    <div class="voicerControl"><label for="voicerMinNote">Min Note</label><input id="voicerMinNote" type="number" min="0" max="127"/></div>
    <div class="voicerControl"><label for="voicerMaxNote">Max Note</label><input id="voicerMaxNote" type="number" min="0" max="127"/></div>
    <div class="voicerControl voicerWide"><div id="voicerReadout" class="voicerReadout"><div class="voicerLast">Last: <span id="voicerLastChord">--</span></div><div id="voicerLastNotes" class="voicerHint">Play a fret to write or audition a voiced chord.</div></div></div>
  </div>

async function waitForFluidSynthWrapper(){
 // js-synthesizer can appear before the wasm wrapper is truly ready on mobile Safari.
 for(let i=0;i<120;i++){
  if(window.JSSynth && typeof window.JSSynth.waitForReady==="function"){
   try{
    await window.JSSynth.waitForReady();
    return true;
   }catch(e){}
  }
  if(window.Module && typeof window.Module.cwrap==="function")return true;
  await new Promise(r=>setTimeout(r,50));
 }
 return false;
}

async function ensureRealSoundFont(){
 ensureAudio();
 if(state.sfSynth||state.sfLoading)return;
 state.sfLoading=true;
 setSfStatus("Starting SF2 engine...");
 try{
  if(!window.JSSynth)throw new Error("js-synthesizer unavailable");
  const ready=await waitForFluidSynthWrapper();
  if(!ready)throw new Error("FluidSynth wrapper not ready");
  const synth=new window.JSSynth.Synthesizer();
  synth.init(state.audioCtx.sampleRate,{initialGain:.7,midiChannelCount:16});
  let node=null,lastErr=null;
  for(const b of [512,1024,256,128]){
   try{
    node=synth.createAudioNode(state.audioCtx,b);
    break;
   }catch(e){lastErr=e}
  }
  if(!node)throw lastErr||new Error("audio node failed");
  node.connect(state.audioCtx.destination);
  state.sfSynth=synth;
  state.sfNode=node;
 }catch(err){
  state.sfSynth=null;
  state.sfNode=null;
  state.sfReady=false;
  const msg=(err&&err.message)?err.message:String(err);
  setSfStatus("SF2 unavailable: "+msg);
  throw err;
 }finally{
  state.sfLoading=false;
 }
}

async function loadDefaultSoundFont(){
 if(state.sfLoading)return false;
 try{
  setSfStatus("Loading SF2...");
  await ensureRealSoundFont();
  if(state.sfId!=null){try{state.sfSynth.unloadSFont(state.sfId)}catch{}}
  const res=await fetch(normalizeSoundFontUrl(DEFAULT_SF2_URL),{cache:"force-cache"});
  if(!res.ok)throw new Error("SF2 fetch failed");
  const buf=await res.arrayBuffer();
  state.sfId=await state.sfSynth.loadSFont(buf);
  state.sfReady=true;
  state.sfProgramCache={};
  setProgramsForAllTracks();
  el.sfLoadBtn.textContent="Loaded";
  setSfStatus("loaded");
  render();
  return true;
 }catch(err){
  state.sfReady=false;
  el.sfLoadBtn.textContent="Retry SF2";
  const msg=(err&&err.message)?err.message:String(err);
  setSfStatus("Using fallback sounds. "+msg);
  render();
  return false;
 }
}

 const prog=gmProgram(track.sound);

  const key=track.id+":"+ch+":"+prog;
  if(state.sfProgramCache[key])continue;
  try{state.sfSynth.programSelect(ch,state.sfId,0,prog)}catch(e){try{state.sfSynth.programChange(ch,prog)}catch{}}

   try{state.sfNode.disconnect()}catch{}

   try{setProgramsForAllTracks()}catch{}

   loadDefaultSoundFont().catch(()=>{});

 }catch(e){}
}

function stabilizeMobileHeight(){
 try{
  const vv=window.visualViewport;
  const h=Math.floor((vv&&vv.height)?vv.height:window.innerHeight||document.documentElement.clientHeight);
  document.documentElement.style.setProperty("--appH",h+"px");
  const app=document.getElementById("app");
  if(app){
   app.style.height="calc(var(--appH) - env(safe-area-inset-top) - 4px)";
   app.style.maxHeight=app.style.height;
   app.style.overflow="hidden";
  }
  renderVZoomThumb&&renderVZoomThumb();
 }catch(e){}
}
function scheduleStabilize(){
 stabilizeMobileHeight();
 requestAnimationFrame(stabilizeMobileHeight);
 setTimeout(stabilizeMobileHeight,60);
 setTimeout(stabilizeMobileHeight,250);
 setTimeout(stabilizeMobileHeight,700);
 setTimeout(stabilizeMobileHeight,1400);
}
window.addEventListener("resize",scheduleStabilize);
window.addEventListener("orientationchange",scheduleStabilize);
window.addEventListener("pageshow",scheduleStabilize);
if(window.visualViewport){
 window.visualViewport.addEventListener("resize",scheduleStabilize);
 window.visualViewport.addEventListener("scroll",scheduleStabilize);
}
document.addEventListener("DOMContentLoaded",scheduleStabilize);
scheduleStabilize();

let trackFxTarget=null,trackFxUndoArmed=false;
function hzLabel(v){return v>=1000?(Math.round(v/100)/10)+"k":String(Math.round(v))}
function fxPct(v){return String(Math.round(clamp(Number(v)||0,0,1)*100))}
function syncTrackFxValueLabels(){
 if(!trackFxTarget)return;
 const fx=trackFx(trackFxTarget);
 if(el.fxLowCutValue)el.fxLowCutValue.textContent=hzLabel(Number(fx.lowCut)||20);
 if(el.fxHighCutValue)el.fxHighCutValue.textContent=hzLabel(Number(fx.highCut)||18000);
 if(el.fxReverbMixValue)el.fxReverbMixValue.textContent=fxPct(fx.reverbMix);
 if(el.fxReverbTimeValue)el.fxReverbTimeValue.textContent=Number(fx.reverbTime||1.2).toFixed(1);
 if(el.fxDelayMixValue)el.fxDelayMixValue.textContent=fxPct(fx.delayMix);
 if(el.fxDelayTimeValue)el.fxDelayTimeValue.textContent=Number(fx.delayTime||.25).toFixed(2);
 if(el.fxChorusValue)el.fxChorusValue.textContent=fxPct(fx.chorus);
}
function writeFxControls(track){
 const fx=trackFx(track);
 if(el.fxLowCut)el.fxLowCut.value=String(fx.lowCut);
 if(el.fxHighCut)el.fxHighCut.value=String(fx.highCut);
 if(el.fxReverbMix)el.fxReverbMix.value=String(fx.reverbMix);
 if(el.fxReverbTime)el.fxReverbTime.value=String(fx.reverbTime);
 if(el.fxReverbType)el.fxReverbType.value=fx.reverbType||"Room";
 if(el.fxDelayMix)el.fxDelayMix.value=String(fx.delayMix);
 if(el.fxDelayTime)el.fxDelayTime.value=String(fx.delayTime);
 if(el.fxChorus)el.fxChorus.value=String(fx.chorus);
 syncTrackFxValueLabels();
}
function markTrackFxEdit(){
 if(!trackFxTarget)return;
 if(!trackFxUndoArmed){pushUndo();trackFxUndoArmed=true}
}
function readTrackFxControls(){
 if(!trackFxTarget)return;
 const fx=trackFx(trackFxTarget);
 fx.lowCut=clamp(controlNumber(el.fxLowCut,20),20,8000);
 fx.highCut=clamp(controlNumber(el.fxHighCut,18000),Math.max(800,fx.lowCut+80),20000);
 fx.reverbMix=clamp(controlNumber(el.fxReverbMix,0),0,1);
 fx.reverbTime=clamp(controlNumber(el.fxReverbTime,1.2),.2,5);
 fx.reverbType=el.fxReverbType?.value||"Room";
 fx.delayMix=clamp(controlNumber(el.fxDelayMix,0),0,1);
 fx.delayTime=clamp(controlNumber(el.fxDelayTime,.25),.06,1.2);
 fx.chorus=clamp(controlNumber(el.fxChorus,0),0,1);
 if(el.fxHighCut&&Number(el.fxHighCut.value)!==fx.highCut)el.fxHighCut.value=String(fx.highCut);
 syncTrackFxValueLabels();
}
function openTrackFxMenu(track){
 if(!el.trackFxMenu)return;
 trackFxTarget=ensureTrackDefaults(track);
 trackFxUndoArmed=false;
 if(el.trackFxTitle)el.trackFxTitle.textContent=trackDisplayName(trackFxTarget)+" FX";
 writeFxControls(trackFxTarget);
 el.trackFxMenu.classList.add("open");
}
function bindTrackFxControls(){
 const controls=[el.fxLowCut,el.fxHighCut,el.fxReverbMix,el.fxReverbTime,el.fxReverbType,el.fxDelayMix,el.fxDelayTime,el.fxChorus];
 for(const c of controls){
  if(!c)return;
  c.addEventListener(c.type==="range"?"input":"change",()=>{markTrackFxEdit();readTrackFxControls()});
 }
 if(el.trackFxCloseBtn)el.trackFxCloseBtn.onclick=()=>{el.trackFxMenu.classList.remove("open");trackFxTarget=null;trackFxUndoArmed=false;render()};
 if(el.trackFxResetBtn)el.trackFxResetBtn.onclick=()=>{if(!trackFxTarget)return;pushUndo();trackFxTarget.fx=defaultTrackFx();writeFxControls(trackFxTarget);render()};
}
bindTrackFxControls();

function isLightColor(c){
 try{
  const ctx=document.createElement("canvas").getContext("2d");
  ctx.fillStyle=c;const v=ctx.fillStyle;let r=0,g=0,b=0;
  if(v[0]==="#"){r=parseInt(v.slice(1,3),16);g=parseInt(v.slice(3,5),16);b=parseInt(v.slice(5,7),16)}
  return (r*299+g*587+b*114)/1000>160;
 }catch{return false}
}
function applyTheme(vals){
 const root=document.documentElement;
 const names=["--bg","--panel","--panel2","--line","--text","--muted","--accent","--accent2","--chord"];
 for(let i=0;i<names.length;i++)root.style.setProperty(names[i],vals[i+1]);root.style.setProperty("color-scheme",isLightColor(vals[1])?"light":"dark");
}
function randomHex(){
 return "#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");
}
function randomTheme(mono=false){
 if(mono){
  const dark=Math.random()>.5;
  const base=dark?Math.floor(Math.random()*40):220+Math.floor(Math.random()*30);
  const bg=`rgb(${base},${base},${base})`;
  const panel=`rgb(${Math.max(0,Math.min(255,base+(dark?12:-12)))},${Math.max(0,Math.min(255,base+(dark?12:-12)))},${Math.max(0,Math.min(255,base+(dark?12:-12)))})`;
  const text=dark?"#f5f5f5":"#111111";
  applyTheme(["Random Mono",bg,panel,panel,dark?"#444":"#bbb",text,dark?"#aaa":"#666",text,dark?"#999":"#555",dark?"#ddd":"#333"]);
 }else{
  const bg=randomHex();const light=isLightColor(bg);applyTheme(["Random",bg,randomHex(),randomHex(),randomHex(),light?"#111111":"#f8f8ff",light?"#555555":"#b9b9c8",randomHex(),randomHex(),randomHex()]);
 }
}

 }
