function fretCandidatesForMidi(midi){
 const exact=[];
 const pitchClass=[];
 for(const s of strings){
  const exactFret=midi-s.midi;
  if(exactFret>=0&&exactFret<=12)exact.push({stringName:s.name,fret:exactFret,exact:true});
  for(let f=0;f<=12;f++){
   if(mod12(s.midi+f)===mod12(midi))pitchClass.push({stringName:s.name,fret:f,exact:false});
  }
 }
 exact.sort((a,b)=>a.fret-b.fret);
 pitchClass.sort((a,b)=>Math.abs(a.fret-5)-Math.abs(b.fret-5)||a.fret-b.fret);
 return [...exact,...pitchClass];
}
function mapNotesToFretLights(items){
 const out=[],perString={};
 const used=new Set();
 for(const item of items){
  let chosen=null;
  if(item.stringName&&item.fret!=null){
   const key=item.stringName+":"+item.fret;
   if((perString[item.stringName]||0)<2&&!used.has(key))chosen={stringName:item.stringName,fret:item.fret};
  }
  if(!chosen){
   for(const candidate of fretCandidatesForMidi(item.midi)){
    const key=candidate.stringName+":"+candidate.fret;
    if((perString[candidate.stringName]||0)>=2||used.has(key))continue;
    chosen=candidate;
    break;
   }
  }
  if(!chosen)continue;
  const key=chosen.stringName+":"+chosen.fret;
  used.add(key);
  perString[chosen.stringName]=(perString[chosen.stringName]||0)+1;
  out.push({stringName:chosen.stringName,fret:chosen.fret,color:item.color||"yellow"});
 }
 return out;
}

 state.liveFretLights.push(...mapNotesToFretLights(items).map(light=>({...light,expires})));

  ["11",[0,4,7,10,2,5]],["m11",[0,3,7,10,2,5]],["maj9#11",[0,4,7,11,2,6]],
  ["9",[0,4,7,10,2]],["m9",[0,3,7,10,2]],["maj9",[0,4,7,11,2]],["7b9",[0,4,7,10,1]],["7#9",[0,4,7,10,3]],["7#11",[0,4,7,10,6]],["7b5",[0,4,6,10]],["7#5",[0,4,8,10]],["7sus4",[0,5,7,10]],
  ["6/9",[0,4,7,9,2]],["m6/9",[0,3,7,9,2]],["6",[0,4,7,9]],["m6",[0,3,7,9]],
  ["maj7",[0,4,7,11]],["mMaj7",[0,3,7,11]],["m7b5",[0,3,6,10]],["dim7",[0,3,6,9]],["m7",[0,3,7,10]],["7",[0,4,7,10]],
  ["add9",[0,4,7,2]],["madd9",[0,3,7,2]],["sus4",[0,5,7]],["sus2",[0,2,7]],["dim",[0,3,6]],["aug",[0,4,8]],["m",[0,3,7]],["",[0,4,7]],["5",[0,7]]

  const ints=pcs.map(pc=>(pc-root+12)%12);
  for(const [name,need] of qualities){

    if(!best||score>best.score)best={name:names[root]+name,score};

 function endPointer(e){

  pointers.delete(e.pointerId);
  clearTimeout(selectTimer);

  if(wasMode==="box"){

   mode="idle";

    if(state.chordMode){render();return;}
    const rect=el.timelineViewport.getBoundingClientRect();
    state.tick=xToTick(e.clientX-rect.left);
    state.selectedIds.clear();
    render();
   }
  }

  if(pointers.size===0){
   mode="idle";
   pinch=null;
  }else if(pointers.size===1){
   const p=[...pointers.values()][0];
   mode="pan";
   lastX=downX=p.x;
   lastY=downY=p.y;
   pinch=null;
  }

   app.style.height="calc(var(--appH) - env(safe-area-inset-top) - 4px)";

}

function isLightColor(c){
 try{
  const ctx=document.createElement("canvas").getContext("2d");
  ctx.fillStyle=c;const v=ctx.fillStyle;let r=0,g=0,b=0;
  if(v[0]==="#"){r=parseInt(v.slice(1,3),16);g=parseInt(v.slice(3,5),16);b=parseInt(v.slice(5,7),16)}
  return (r*299+g*587+b*114)/1000>160;
 }catch{return false}
}
function applyTheme(vals){
 const root=document.documentElement;
 const names=["--bg","--panel","--panel2","--line","--text","--muted","--accent","--accent2","--chord"];
 for(let i=0;i<names.length;i++)root.style.setProperty(names[i],vals[i+1]);root.style.setProperty("color-scheme",isLightColor(vals[1])?"light":"dark");
}
function randomHex(){
 return "#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");
}
function randomTheme(mono=false){
 if(mono){
  const dark=Math.random()>.5;
  const base=dark?Math.floor(Math.random()*40):220+Math.floor(Math.random()*30);
  const bg=`rgb(${base},${base},${base})`;
  const panel=`rgb(${Math.max(0,Math.min(255,base+(dark?12:-12)))},${Math.max(0,Math.min(255,base+(dark?12:-12)))},${Math.max(0,Math.min(255,base+(dark?12:-12)))})`;
  const text=dark?"#f5f5f5":"#111111";
  applyTheme(["Random Mono",bg,panel,panel,dark?"#444":"#bbb",text,dark?"#aaa":"#666",text,dark?"#999":"#555",dark?"#ddd":"#333"]);
 }else{
  const bg=randomHex();const light=isLightColor(bg);applyTheme(["Random",bg,randomHex(),randomHex(),randomHex(),light?"#111111":"#f8f8ff",light?"#555555":"#b9b9c8",randomHex(),randomHex(),randomHex()]);
 }
}
function renderThemeMenu(){
 if(!el.themeList)return;
 el.themeList.innerHTML="";
 for(const t of appThemes){
  const b=document.createElement("button");
  b.className="themeSwatch";
  b.textContent=t[0];
  b.style.background=`linear-gradient(90deg,${t[1]},${t[2]},${t[7]})`;
  b.style.color=t[4];
  b.onclick=()=>{applyTheme(t)};
  el.themeList.appendChild(b);
 }
}
if(el.themeBtn)el.themeBtn.onclick=e=>{e.stopPropagation();renderThemeMenu();el.themeMenu.classList.toggle("open")};
if(el.themeMenuCloseBtn)el.themeMenuCloseBtn.onclick=()=>el.themeMenu.classList.remove("open");
if(el.randomThemeBtn)el.randomThemeBtn.onclick=()=>randomTheme(false);
if(el.randomMonoThemeBtn)el.randomMonoThemeBtn.onclick=()=>randomTheme(true);

setupVoicerControls();renderFretboard();setupTimelineGestures();setupBarZoomHeader();setupVZoomStrip();render();
</script>
